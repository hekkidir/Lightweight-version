[data]
history_years    = 3
mcap_refresh_days = 7

[screener]
breadth_stages = 2A,2B

[stage_thresholds]
slope_threshold = 0.003
slope_window    = 20

rsi_2a_floor = 45
rsi_2b       = 60
rsi_2c       = 73
ext_2c       = 5.0

rsi_4a_ceil = 55
rsi_4b      = 38
rsi_4c      = 27
ext_4c      = -3.0

rsi_1b_floor = 40
rsi_3b_ceil  = 50

rvol_confirm = 1.1
rvol_window  = 21

# How many recent trading bars back a ticker's last bar may be and still appear.
# A ticker that misses today's live snapshot falls back to its last real bar
# within this window instead of vanishing; older (likely delisted) ones drop out.
max_stale_bars = 5

[download]
chunk_size = 25

[rotation]
window_position      = 20
window_momentum      = 5
tail_length          = 7
cohesion_window      = 30
cohesion_full        = 0.5
cohesion_min         = 0.3
min_tickers_cohesion = 12
ema_smooth           = 3
benchmark_weighting  = equal
