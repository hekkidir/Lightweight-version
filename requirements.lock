# requirements.lock — exact runtime versions known to work together.
#
# These are the versions the project is developed and tested against. Pinning
# them keeps "works on my machine" reproducible (the pandas-3 / numpy-2 behavior
# this project depends on is version-sensitive).
#
# Regenerate from a clean virtualenv when you intentionally upgrade:
#     python -m venv .venv && .venv/Scripts/pip install -e . && pip freeze > requirements.lock
#
# Abstract dependency names + lower bounds live in pyproject.toml; this file is
# the concrete pinned set.

