name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "frontend/data/**"

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: serdardursun/stock-analysis:latest
          cache-from: type=registry,ref=serdardursun/stock-analysis:cache
          cache-to: type=registry,ref=serdardursun/stock-analysis:cache,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 204.168.159.237
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /opt/stock-analysis

      - name: Pull image, restart, configure data pipeline
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 204.168.159.237
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_PAT
          script: |
            cd /opt/stock-analysis
            mkdir -p data static-export

            docker pull serdardursun/stock-analysis:latest
            docker compose up -d --remove-orphans
            docker image prune -f

            # Clone repo (first time) or pull latest
            if [ ! -d /opt/stock-analysis/repo/.git ]; then
              git clone https://$GH_PAT@github.com/hekkidir/Lightweight-version.git /opt/stock-analysis/repo
            else
              cd /opt/stock-analysis/repo
              git remote set-url origin https://$GH_PAT@github.com/hekkidir/Lightweight-version.git
              git pull
            fi

            cd /opt/stock-analysis/repo
            git config user.email "pipeline@screener"
            git config user.name "Screener Pipeline"

            # Write the daily data-update script
            cat > /opt/stock-analysis/update-data.sh << 'SCRIPT'
            #!/bin/bash
            set -e
            cd /opt/stock-analysis

            echo "[$(date)] Running pipeline..."
            docker compose exec -T screener python run.py pipeline --force

            echo "[$(date)] Exporting static JSON..."
            docker compose exec -T screener python -m pipeline.export_static /app/data /app/static-export

            echo "[$(date)] Pushing to GitHub..."
            cp -r /opt/stock-analysis/static-export/. /opt/stock-analysis/repo/frontend/data/
            cd /opt/stock-analysis/repo
            git pull
            git add frontend/data/
            git diff --staged --quiet && echo "No data changes." && exit 0
            git commit -m "data: auto-update $(date +%Y-%m-%d)"
            git push
            echo "[$(date)] Done."
            SCRIPT
            chmod +x /opt/stock-analysis/update-data.sh

            # Install/update cron (Mon-Fri 21:00 UTC = 4 PM ET)
            CRON_JOB="0 21 * * 1-5 /opt/stock-analysis/update-data.sh >> /var/log/screener-pipeline.log 2>&1"
            (crontab -l 2>/dev/null | grep -v "update-data.sh"; echo "$CRON_JOB") | crontab -
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
