name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: serdardursun/stock-analysis:latest
          cache-from: type=registry,ref=serdardursun/stock-analysis:cache
          cache-to: type=registry,ref=serdardursun/stock-analysis:cache,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 204.168.159.237
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /opt/stock-analysis

      - name: Pull image and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 204.168.159.237
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/stock-analysis
            mkdir -p data
            docker pull serdardursun/stock-analysis:latest
            docker compose up -d --remove-orphans
            docker image prune -f

            # Install/update the pipeline cron job (runs Mon-Fri at 21:00 UTC = 4 PM ET)
            CRON_JOB="0 21 * * 1-5 cd /opt/stock-analysis && docker compose exec -T screener python run.py pipeline >> /var/log/screener-pipeline.log 2>&1"
            (crontab -l 2>/dev/null | grep -v "screener pipeline"; echo "$CRON_JOB") | crontab -
